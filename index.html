<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
    </head>

<body style="margin: 0; overflow: hidden;">
<a-scene
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
  renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias: auto;"
  arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
  id="scene"
  embedded
  gesture-detector
>
  <a-assets>
      <a-asset-item id="animated-asset" src="assets/asset.glb"></a-asset-item>
    </a-assets>

<a-marker
  id="markerA"
  type="pattern"
  url="assets/marker.patt"
>
  <a-entity id="balloon-system" balloon-spawner></a-entity>
</a-marker>

  <a-entity light="type: ambient; intensity: 1.2"></a-entity>
  <a-entity light="type: directional; intensity: 0.8; position: 1 2 1"></a-entity>
  <a-light type="ambient" intensity="0.85" color="#ffffff"></a-light>
  <a-light type="directional" intensity="1.15" color="#ffffff" position="1 3 2"></a-light>
  <a-light type="point" intensity="1.2" color="#ffffff" position="0 2 1.5"></a-light>
  </a-scene>

<script>
  AFRAME.registerComponent('balloon-spawner', {
    init: function () {
      this.balloons = [];
      this.modelId = '#animated-asset';

      const width = window.innerWidth;

      // 前回の約5倍
      this.count = Math.max(90, Math.min(180, Math.round(width / 12)));

      // 密度を保つため、範囲も約√5倍に広げる
      this.radiusX = 3.4;
      this.radiusZ = 2.5;

      // 画面外のかなり下から、かなり上まで
      this.minY = -5.8;
      this.maxY = 8.2;

      this.baseScale = 0.1389;

      for (let i = 0; i < this.count; i++) {
        const balloon = document.createElement('a-entity');
        balloon.setAttribute('gltf-model', this.modelId);

        const state = this.makeBalloonState(true);

        balloon.object3D.position.set(state.x, state.y, state.z);
        balloon.object3D.scale.set(state.scale, state.scale, state.scale);

        this.el.appendChild(balloon);
        this.balloons.push({ el: balloon, state });
      }
    },

    makeBalloonState: function (randomiseY) {
      const x = (Math.random() - 0.5) * this.radiusX * 2;
      const z = (Math.random() - 0.5) * this.radiusZ * 2;

      const y = randomiseY
        ? this.minY + Math.random() * (this.maxY - this.minY)
        : this.minY - (1.2 + Math.random() * 2.2);

      const scale = this.baseScale * (0.9 + Math.random() * 0.24);

      return {
        x, y, z,
        baseX: x,
        baseZ: z,

        // 少し斜めに流れる
        driftX: (Math.random() - 0.5) * 1.35,
        driftZ: (Math.random() - 0.5) * 1.0,

        // 前よりさらに速く
        speedY: 1.55 + Math.random() * 0.75,

        // わずかな横揺れ
        swayAmpX: 0.025 + Math.random() * 0.045,
        swayAmpZ: 0.02 + Math.random() * 0.04,
        swayFreqX: 0.75 + Math.random() * 0.9,
        swayFreqZ: 0.7 + Math.random() * 0.85,
        swayPhaseX: Math.random() * Math.PI * 2,
        swayPhaseZ: Math.random() * Math.PI * 2,

        // 軽い自転
        spinSpeed: (Math.random() - 0.5) * 0.55,

        scale,

        prevX: x,
        prevY: y,
        prevZ: z
      };
    },

    tick: function (time, timeDelta) {
      const dt = timeDelta / 1000;
      const t = time / 1000;

      for (let i = 0; i < this.balloons.length; i++) {
        const balloon = this.balloons[i];
        const el = balloon.el;
        const s = balloon.state;

        s.prevX = el.object3D.position.x;
        s.prevY = el.object3D.position.y;
        s.prevZ = el.object3D.position.z;

        s.y += s.speedY * dt;

        const progress = (s.y - this.minY) / (this.maxY - this.minY);
        const clamped = Math.max(0, Math.min(progress, 1));

        const px =
          s.baseX +
          s.driftX * clamped +
          Math.sin(t * s.swayFreqX + s.swayPhaseX) * s.swayAmpX;

        const pz =
          s.baseZ +
          s.driftZ * clamped +
          Math.cos(t * s.swayFreqZ + s.swayPhaseZ) * s.swayAmpZ;

        el.object3D.position.set(px, s.y, pz);

        // 進行方向
        const vx = px - s.prevX;
        const vy = s.y - s.prevY;
        const vz = pz - s.prevZ;
        const velocity = new THREE.Vector3(vx, vy, vz);

        if (velocity.lengthSq() > 0.000001) {
          velocity.normalize();

          // 風船の上方向が進行方向を向く
          const upAxis = new THREE.Vector3(0, 1, 0);
          const q = new THREE.Quaternion().setFromUnitVectors(upAxis, velocity);
          el.object3D.quaternion.copy(q);

          // 進行方向を軸に軽く自転
          const spinQ = new THREE.Quaternion();
          spinQ.setFromAxisAngle(velocity, s.spinSpeed * t);
          el.object3D.quaternion.multiply(spinQ);
        }

        if (s.y > this.maxY) {
          const newState = this.makeBalloonState(false);
          balloon.state = newState;
          el.object3D.position.set(newState.x, newState.y, newState.z);
          el.object3D.scale.set(newState.scale, newState.scale, newState.scale);
        }
      }
    }
  });
</script>
</body>
